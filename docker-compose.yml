services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: ${CONTAINER_NAME:-karakuri-agent}
    restart: unless-stopped
    user: "${UID:?Set UID in .env}:${GID:?Set GID in .env}"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://127.0.0.1:${PORT:-3000}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
